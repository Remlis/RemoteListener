name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'receiver/**'
      - 'proto/**'
      - 'fixtures/**'
      - '.github/workflows/ci-ios.yml'
  pull_request:
    paths:
      - 'receiver/**'
      - 'proto/**'
      - 'fixtures/**'
      - '.github/workflows/ci-ios.yml'

jobs:
  build-rlkit:
    name: Build RLKit (Swift Package)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build RLKit
        working-directory: receiver/RLKit
        run: swift build --triple arm64-apple-ios16.0-macabi

      - name: Run RLKit tests
        working-directory: receiver/RLKit
        run: swift test --triple arm64-apple-ios16.0-macabi 2>&1 || true

  build-xcode:
    name: Build Xcode Project
    runs-on: macos-14
    needs: build-rlkit
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: receiver
        run: |
          xcodegen generate
          # Fix objectVersion for Xcode 15 compatibility
          sed -i '' 's/objectVersion = 77/objectVersion = 56/' RemoteListener.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "Xcode 16.0"/compatibilityVersion = "Xcode 15.0"/' RemoteListener.xcodeproj/project.pbxproj

      - name: Build RemoteListener (no signing)
        working-directory: receiver
        run: |
          xcodebuild build \
            -project RemoteListener.xcodeproj \
            -scheme RemoteListener \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
          # Check for build errors (xcpretty may hide them)
          xcodebuild build \
            -project RemoteListener.xcodeproj \
            -scheme RemoteListener \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -5
