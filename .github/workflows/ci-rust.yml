name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'proto/**'
      - 'tests/**'
      - 'fuzz/**'
      - '.github/workflows/ci-rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'proto/**'
      - 'tests/**'
      - 'fuzz/**'
      - '.github/workflows/ci-rust.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Linux — 全部 Rust 测试（主力）
  # ──────────────────────────────────────────────
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev libasound2-dev libclang-dev protobuf-compiler libgtk-3-dev libglib2.0-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev

      - name: Build
        run: cargo build --workspace

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Doc tests
        run: cargo test --workspace --doc

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # Job 2: Windows — 编译 + 测试（验证跨平台）
  # ──────────────────────────────────────────────
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install protoc
        run: |
          $protocVersion = "28.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$protocVersion/protoc-$protocVersion-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile protoc.zip
          Expand-Archive -Path protoc.zip -DestinationPath protoc
          echo "$env:GITHUB_WORKSPACE\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install vcpkg deps
        run: vcpkg install opus:x64-windows

      - name: Build
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          OPUS_LIB_DIR: ${{ github.workspace }}\vcpkg\installed\x64-windows\lib
        run: cargo build --workspace

      - name: Tests (exclude real-device tests)
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          OPUS_LIB_DIR: ${{ github.workspace }}\vcpkg\installed\x64-windows\lib
        run: cargo test --workspace --lib -- --skip real_device

  # ──────────────────────────────────────────────
  # Job 3: 交叉验证 fixture 生成（存 artifact）
  # TODO: add fixture_gen integration test when ready
  # ──────────────────────────────────────────────
  generate-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: sudo apt-get update && sudo apt-get install -y pkg-config libopus-dev libasound2-dev libclang-dev protobuf-compiler libgtk-3-dev libglib2.0-dev libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev

      - name: Build testtool
        run: cargo build -p rl-testtool

      - name: Upload testtool binary
        uses: actions/upload-artifact@v4
        with:
          name: rl-testtool-linux
          path: target/debug/rl-testtool
          retention-days: 1
